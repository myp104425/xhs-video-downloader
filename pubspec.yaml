name: xhs_video_downloader
description: 多平台视频解析下载工具 - 支持小红书/抖音/快手/B站/微博，粘贴链接即可解析下载无水印视频
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  path_provider: ^2.1.1
  dio: ^5.3.3
  permission_handler: ^11.1.0
  open_filex: ^4.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
